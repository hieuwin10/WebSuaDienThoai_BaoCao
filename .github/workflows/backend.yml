name: Backend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Start MongoDB with Replica Set
      run: |
        docker run -d --name mongodb -p 27017:27017 mongo:latest mongod --replSet rs0 --bind_ip_all
        sleep 5

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'

    - name: Install Dependencies
      run: npm install

    - name: Initialize MongoDB Replica Set
      run: |
        docker run --net host mongo:latest mongosh --eval 'rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "localhost:27017" }] })'
        sleep 5

    - name: Run Tests
      env:
        MONGO_URI: mongodb://localhost:27017/test_db
        JWT_SECRET: supersecret_test_key
      run: npm test

    - name: Verify DB Connection and Run Seed Script
      env:
        MONGO_URI: mongodb://localhost:27017/test_db
        JWT_SECRET: supersecret_test_key
      run: npm run seed:demo
