services:
  mongodb:
    image: mongo:latest
    container_name: phone_repair_mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - phone_repair_net

volumes:
  mongodb_data:
    driver: local

networks:
  phone_repair_net:
    driver: bridge
